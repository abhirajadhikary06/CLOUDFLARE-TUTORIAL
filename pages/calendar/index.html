<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCal — Shared Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e11;
    --surface: #17171c;
    --surface2: #1f1f27;
    --border: #2c2c38;
    --accent: #c8f04a;
    --accent2: #7b5ef8;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --danger: #f04a4a;
    --today-glow: rgba(200,240,74,0.18);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999;
  }

  /* ── NAV ── */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .nav-logo span { color: var(--text); }
  .nav-links { display: flex; gap: 8px; }
  .nav-link {
    padding: 8px 16px; border-radius: 8px;
    font-size: 0.78rem; letter-spacing: 0.04em; text-transform: uppercase;
    text-decoration: none; color: var(--muted);
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .nav-link:hover, .nav-link.active {
    color: var(--text); border-color: var(--border);
    background: var(--surface2);
  }
  .device-badge {
    font-size: 0.7rem; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .device-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  /* ── MAIN LAYOUT ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    max-width: 1300px;
    margin: 0 auto;
    padding: 32px 24px;
    min-height: calc(100vh - 65px);
  }

  /* ── CALENDAR SECTION ── */
  .calendar-section { padding-right: 32px; }

  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .cal-month {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 700;
    letter-spacing: -1px;
  }
  .cal-year { color: var(--muted); font-size: 1.2rem; }
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); width: 38px; height: 38px; border-radius: 8px;
    cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    margin-bottom: 8px;
  }
  .cal-weekday {
    text-align: center; font-size: 0.68rem;
    color: var(--muted); letter-spacing: 0.1em;
    text-transform: uppercase; padding: 8px 0;
  }
  .cal-weekday:first-child { color: var(--danger); }

  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-day {
    min-height: 90px; padding: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer;
    transition: all 0.15s; position: relative;
    overflow: hidden;
  }
  .cal-day:hover { border-color: var(--accent2); background: var(--surface2); }
  .cal-day.other-month { opacity: 0.3; pointer-events: none; }
  .cal-day.today {
    border-color: var(--accent);
    background: var(--today-glow);
    box-shadow: 0 0 20px rgba(200,240,74,0.08);
  }
  .cal-day.selected {
    border-color: var(--accent2);
    background: rgba(123,94,248,0.12);
  }
  .cal-day.has-events::after {
    content: '';
    position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent2);
  }
  .day-num {
    font-size: 0.8rem; font-weight: 500;
    color: var(--muted); margin-bottom: 4px;
  }
  .cal-day.today .day-num {
    color: var(--accent); font-weight: 700;
  }
  .day-events { display: flex; flex-direction: column; gap: 2px; }
  .day-event-pill {
    font-size: 0.62rem; padding: 2px 5px; border-radius: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    background: rgba(123,94,248,0.25); color: #c4b5fd;
    border-left: 2px solid var(--accent2);
  }
  .day-event-pill.mine {
    background: rgba(200,240,74,0.15); color: #c8f04a;
    border-left-color: var(--accent);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-left: 1px solid var(--border);
    padding-left: 32px;
    display: flex; flex-direction: column; gap: 24px;
  }

  .sidebar-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 700;
    margin-bottom: 4px;
  }
  .selected-date-label {
    font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── ADD EVENT FORM ── */
  .event-form {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .form-label {
    font-size: 0.68rem; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    display: block; margin-bottom: 4px;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 10px 12px;
    font-family: 'DM Mono', monospace; font-size: 0.82rem;
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent2);
  }
  .form-textarea { resize: none; height: 72px; }
  .form-select option { background: var(--bg); }

  .color-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .color-chip {
    width: 24px; height: 24px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: transform 0.15s;
  }
  .color-chip:hover { transform: scale(1.2); }
  .color-chip.selected { border-color: #fff; transform: scale(1.2); }

  .btn {
    padding: 10px 18px; border-radius: 8px; border: none;
    font-family: 'DM Mono', monospace; font-size: 0.8rem;
    letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s;
    font-weight: 500;
  }
  .btn-primary {
    background: var(--accent); color: #0e0e11;
  }
  .btn-primary:hover { background: #d8f860; transform: translateY(-1px); }
  .btn-danger {
    background: transparent; color: var(--danger);
    border: 1px solid var(--danger);
  }
  .btn-danger:hover { background: rgba(240,74,74,0.1); }
  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text); }

  /* ── EVENT LIST ── */
  .event-list { display: flex; flex-direction: column; gap: 10px; }
  .event-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    border-left: 3px solid var(--accent2);
    transition: all 0.15s; position: relative;
  }
  .event-card:hover { border-color: var(--border); background: var(--surface2); }
  .event-card.mine { border-left-color: var(--accent); }
  .event-card-title {
    font-size: 0.88rem; font-weight: 500; margin-bottom: 4px;
  }
  .event-card-time {
    font-size: 0.7rem; color: var(--muted); margin-bottom: 6px;
  }
  .event-card-desc {
    font-size: 0.75rem; color: #9999b0; line-height: 1.5;
  }
  .event-card-actions {
    display: flex; gap: 6px; margin-top: 10px;
  }
  .event-owner-tag {
    font-size: 0.62rem; color: var(--accent);
    letter-spacing: 0.08em; text-transform: uppercase;
    display: flex; align-items: center; gap: 4px; margin-top: 4px;
  }
  .viewer-tag {
    font-size: 0.62rem; color: var(--muted);
    letter-spacing: 0.06em; margin-top: 4px;
  }
  .empty-state {
    text-align: center; color: var(--muted);
    font-size: 0.78rem; padding: 24px 0;
    line-height: 2;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200; display: none;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; max-width: 440px; width: 90%;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; font-weight: 700; margin-bottom: 20px;
  }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 20px;
    font-size: 0.8rem; z-index: 500;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 300px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-left: 3px solid var(--accent); }
  .toast.error { border-left: 3px solid var(--danger); }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px;
    flex: 1; min-width: 80px;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; font-weight: 700; color: var(--accent);
  }
  .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; padding: 16px; }
    .calendar-section { padding-right: 0; margin-bottom: 24px; }
    .sidebar { border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: 24px; }
    .cal-day { min-height: 64px; }
  }
  @media (max-width: 600px) {
    nav { padding: 14px 16px; }
    .cal-day { min-height: 48px; padding: 5px; }
    .day-event-pill { display: none; }
  }
</style>
</head>

<script>
// ════════════════════════════════════════════
// DEVICE FINGERPRINT (persistent, anonymous)
// ════════════════════════════════════════════
function getDeviceId() {
  let id = localStorage.getItem('opencal_device_id');
  if (!id) {
    id = 'dev_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    localStorage.setItem('opencal_device_id', id);
  }
  return id;
}
const DEVICE_ID = getDeviceId();
document.getElementById('deviceLabel').textContent = DEVICE_ID.slice(0, 12) + '…';

// ════════════════════════════════════════════
// INDEXEDDB SETUP
// ════════════════════════════════════════════
let db;
const DB_NAME = 'OpenCalDB';
const DB_VER = 1;
const STORE = 'events';

function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        const store = d.createObjectStore(STORE, { keyPath: 'id' });
        store.createIndex('dateIdx', 'date', { unique: false });
        store.createIndex('deviceIdx', 'deviceId', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(); };
    req.onerror = () => reject(req.error);
  });
}

function dbGetAll() {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
function dbGetByDate(date) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readonly');
    const idx = tx.objectStore(STORE).index('dateIdx');
    const req = idx.getAll(date);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
function dbPut(ev) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put(ev);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}
function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let currentYear, currentMonth, selectedDate = null;
let allEvents = [];
let selectedColor = '#7b5ef8';
let editingId = null;
let editColor = '#7b5ef8';

const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

// ════════════════════════════════════════════
// CALENDAR RENDER
// ════════════════════════════════════════════
function renderCalendar() {
  const now = new Date();
  document.getElementById('calMonth').textContent = MONTHS[currentMonth];
  document.getElementById('calYear').textContent = currentYear;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const prevDays = new Date(currentYear, currentMonth, 0).getDate();

  const todayStr = fmt(now.getFullYear(), now.getMonth(), now.getDate());

  // build a quick lookup: date -> events[]
  const evMap = {};
  for (const ev of allEvents) {
    evMap[ev.date] = evMap[ev.date] || [];
    evMap[ev.date].push(ev);
  }

  // prev month padding
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = prevDays - i;
    const cell = makeCell(currentYear, currentMonth - 1, d, true, evMap, todayStr);
    grid.appendChild(cell);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = makeCell(currentYear, currentMonth, d, false, evMap, todayStr);
    grid.appendChild(cell);
  }

  // next month padding
  const total = firstDay + daysInMonth;
  const remaining = (7 - (total % 7)) % 7;
  for (let d = 1; d <= remaining; d++) {
    const cell = makeCell(currentYear, currentMonth + 1, d, true, evMap, todayStr);
    grid.appendChild(cell);
  }

  updateStats();
}

function makeCell(y, m, d, other, evMap, todayStr) {
  // normalise
  const date = new Date(y, m, d);
  const dateStr = fmt(date.getFullYear(), date.getMonth(), date.getDate());
  const dayEvents = evMap[dateStr] || [];

  const cell = document.createElement('div');
  cell.className = 'cal-day' + (other ? ' other-month' : '');
  if (dateStr === todayStr) cell.classList.add('today');
  if (dateStr === selectedDate) cell.classList.add('selected');
  if (dayEvents.length > 0) cell.classList.add('has-events');

  const num = document.createElement('div');
  num.className = 'day-num';
  num.textContent = date.getDate();
  cell.appendChild(num);

  const pills = document.createElement('div');
  pills.className = 'day-events';
  dayEvents.slice(0, 2).forEach(ev => {
    const p = document.createElement('div');
    p.className = 'day-event-pill' + (ev.deviceId === DEVICE_ID ? ' mine' : '');
    p.textContent = ev.title;
    p.style.borderLeftColor = ev.color || '#7b5ef8';
    pills.appendChild(p);
  });
  if (dayEvents.length > 2) {
    const more = document.createElement('div');
    more.className = 'day-event-pill';
    more.textContent = `+${dayEvents.length - 2} more`;
    more.style.background = 'rgba(255,255,255,0.05)';
    more.style.borderLeftColor = '#555';
    pills.appendChild(more);
  }
  cell.appendChild(pills);

  if (!other) cell.addEventListener('click', () => selectDate(dateStr));
  return cell;
}

function fmt(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function goToday() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  renderCalendar();
  selectDate(fmt(now.getFullYear(), now.getMonth(), now.getDate()));
}

// ════════════════════════════════════════════
// DATE SELECTION
// ════════════════════════════════════════════
function selectDate(dateStr) {
  selectedDate = dateStr;
  const [y, m, d] = dateStr.split('-').map(Number);
  const nice = new Date(y, m - 1, d).toLocaleDateString('en-US',
    { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  document.getElementById('sidebarDateTitle').textContent = nice;
  document.getElementById('addBtn').style.display = 'inline-block';
  closeForm();
  renderCalendar();
  loadDateEvents(dateStr);
}

async function loadDateEvents(dateStr) {
  const evs = await dbGetByDate(dateStr);
  evs.sort((a,b) => (a.time||'').localeCompare(b.time||''));
  renderEventList(evs);
  document.getElementById('eventsTitle').textContent =
    evs.length ? `Events (${evs.length})` : 'Events';
}

function renderEventList(evs) {
  const list = document.getElementById('eventList');
  if (!evs.length) {
    list.innerHTML = '<div class="empty-state">No events yet<br>Click ＋ Add to create one</div>';
    return;
  }
  list.innerHTML = '';
  evs.forEach(ev => {
    const mine = ev.deviceId === DEVICE_ID;
    const card = document.createElement('div');
    card.className = 'event-card' + (mine ? ' mine' : '');
    card.style.borderLeftColor = ev.color || '#7b5ef8';

    card.innerHTML = `
      <div class="event-card-title">${escHtml(ev.title)}</div>
      ${ev.time ? `<div class="event-card-time">🕐 ${ev.time}</div>` : ''}
      ${ev.desc ? `<div class="event-card-desc">${escHtml(ev.desc)}</div>` : ''}
      ${mine
        ? `<div class="event-owner-tag">✦ Your Event</div>
           <div class="event-card-actions">
             <button class="btn btn-ghost" style="font-size:0.72rem;padding:5px 10px;" onclick="openEdit('${ev.id}')">Edit</button>
             <button class="btn btn-danger" style="font-size:0.72rem;padding:5px 10px;" onclick="deleteEvent('${ev.id}')">Delete</button>
           </div>`
        : `<div class="viewer-tag">🔒 View only</div>`
      }
    `;
    list.appendChild(card);
  });
}

// ════════════════════════════════════════════
// ADD EVENT
// ════════════════════════════════════════════
function openForm() {
  document.getElementById('eventForm').style.display = 'flex';
  document.getElementById('evTitle').value = '';
  document.getElementById('evTime').value = '';
  document.getElementById('evDesc').value = '';
  selectedColor = '#7b5ef8';
  document.querySelectorAll('#colorRow .color-chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.color === selectedColor);
  });
  document.getElementById('evTitle').focus();
}

function closeForm() {
  document.getElementById('eventForm').style.display = 'none';
}

async function saveEvent() {
  const title = document.getElementById('evTitle').value.trim();
  if (!title) { showToast('Title is required', 'error'); return; }
  if (!selectedDate) { showToast('No date selected', 'error'); return; }

  const ev = {
    id: 'ev_' + Date.now().toString(36) + Math.random().toString(36).slice(2),
    title,
    date: selectedDate,
    time: document.getElementById('evTime').value,
    desc: document.getElementById('evDesc').value.trim(),
    color: selectedColor,
    deviceId: DEVICE_ID,
    createdAt: Date.now()
  };

  await dbPut(ev);
  allEvents = await dbGetAll();
  closeForm();
  await loadDateEvents(selectedDate);
  renderCalendar();
  showToast('Event saved!', 'success');
}

// Color chips
document.getElementById('colorRow').addEventListener('click', e => {
  const chip = e.target.closest('.color-chip');
  if (!chip) return;
  selectedColor = chip.dataset.color;
  document.querySelectorAll('#colorRow .color-chip').forEach(c =>
    c.classList.toggle('selected', c === chip));
});

// ════════════════════════════════════════════
// EDIT EVENT
// ════════════════════════════════════════════
async function openEdit(id) {
  const ev = allEvents.find(e => e.id === id);
  if (!ev || ev.deviceId !== DEVICE_ID) return;
  editingId = id;
  editColor = ev.color || '#7b5ef8';
  document.getElementById('editTitle').value = ev.title;
  document.getElementById('editTime').value = ev.time || '';
  document.getElementById('editDesc').value = ev.desc || '';
  document.querySelectorAll('#editColorRow .color-chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.color === editColor);
  });
  document.getElementById('editModal').classList.add('open');
}

document.getElementById('editColorRow').addEventListener('click', e => {
  const chip = e.target.closest('.color-chip');
  if (!chip) return;
  editColor = chip.dataset.color;
  document.querySelectorAll('#editColorRow .color-chip').forEach(c =>
    c.classList.toggle('selected', c === chip));
});

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  editingId = null;
}

async function saveEdit() {
  const title = document.getElementById('editTitle').value.trim();
  if (!title) { showToast('Title is required', 'error'); return; }
  const ev = allEvents.find(e => e.id === editingId);
  if (!ev) return;
  ev.title = title;
  ev.time = document.getElementById('editTime').value;
  ev.desc = document.getElementById('editDesc').value.trim();
  ev.color = editColor;
  ev.updatedAt = Date.now();
  await dbPut(ev);
  allEvents = await dbGetAll();
  closeEditModal();
  await loadDateEvents(selectedDate);
  renderCalendar();
  showToast('Event updated!', 'success');
}

// ════════════════════════════════════════════
// DELETE EVENT
// ════════════════════════════════════════════
async function deleteEvent(id) {
  const ev = allEvents.find(e => e.id === id);
  if (!ev || ev.deviceId !== DEVICE_ID) {
    showToast('You can only delete your own events', 'error');
    return;
  }
  if (!confirm('Delete this event?')) return;
  await dbDelete(id);
  allEvents = await dbGetAll();
  await loadDateEvents(selectedDate);
  renderCalendar();
  showToast('Event deleted', 'success');
}

// ════════════════════════════════════════════
// STATS
// ════════════════════════════════════════════
function updateStats() {
  const todayStr = fmt(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
  document.getElementById('statTotal').textContent = allEvents.length;
  document.getElementById('statMine').textContent = allEvents.filter(e => e.deviceId === DEVICE_ID).length;
  document.getElementById('statToday').textContent = allEvents.filter(e => e.date === todayStr).length;
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Close modal on overlay click
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeEditModal();
});

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
async function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();

  await initDB();
  allEvents = await dbGetAll();
  renderCalendar();

  // auto-select today
  const todayStr = fmt(now.getFullYear(), now.getMonth(), now.getDate());
  selectDate(todayStr);
}

init().catch(console.error);
</script>
